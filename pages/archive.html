<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archive | LogHue</title>

    <!--CSS LINKS-->
    <link rel="stylesheet" href="https://loghue.com/css/base.css" />
    <link rel="stylesheet" href="https://loghue.com/css/layout.css" />
    <link rel="stylesheet" href="https://loghue.com/css/component.css" />
    <link rel="stylesheet" href="https://loghue.com/css/dashboard.css" />
    <link rel="stylesheet" href="https://loghue.com/css/theme.css" />
    <link rel="stylesheet" href="https://loghue.com/css/pages.css" />
    <link rel="stylesheet" href="https://loghue.com/css/utilities.css" />

    <!--FAVICONS-->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="https://loghue.com/assets/icons/favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://loghue.com/assets/icons/favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="https://loghue.com/assets/icons/favicons/favicon-16x16.png"
    />
  </head>
  <body>
    <!--PRELOADER-->
    <div class="preLoaderContainer">
      <div class="tt-wave-loader"><span></span><span></span><span></span></div>
      <div class="label">Log<span>Hue</span></div>
    </div>
    
    <header class="pageHeader">
      <div class="headerLeft">
        <button class="menuBtn" id="toggleSidebar">
          <span class="menuIcon">
            <!-- Menu Icon -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path
                d="M4 6H20M4 12H20M4 18H20"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </span>
        </button>

        <h1 class="pageTitle">History</h1>
      </div>

      <div class="headerRight">
    
        <button id="notificationToggleBtn" title="Notifications" class="actionBtn">
<svg 
  width="20" 
  height="20" 
  viewBox="0 0 24 24" 
  fill="none" 
  stroke="currentColor" 
  stroke-width="1.8" 
  stroke-linecap="round" 
  stroke-linejoin="round"
>
  <path d="M12 22c1.1 0 2-.9 2-2H10c0 1.1.9 2 2 2z"/>
  <path d="M18 16v-5a6 6 0 10-12 0v5l-1.5 2h15L18 16z"/>
</svg>

        </button>
      </div>
    </header>

    <div id="modalContainer"></div>
    <div id="actionsMessage"></div>
    
         <!--NOTIFICATIONS-->
         <div id="notificationsContainer">
          <h2>Notifications</h2>
      <ul id="notificationsList">
    <p class="placeholderText">Nothing here yet.</p>

      </ul>
    </div>

    
    <main class="main">
      <!-- SIDEBAR -->
      <div class="sidebarContainer" id="generalSidebarContainer"></div>

      <!-- MAIN CONTENT -->
      <article class="mainContent" id="dashboardContent">


        <section id="historyContainer">
          <!-- Dynamic content will load here -->
        </section>
      </article>
    </main>

    <script
      type="module"
      src="https://loghue.com/js/utils/noAuthSessionProtect.js"
    ></script>
    <script
      type="module"
      src="https://loghue.com/js/features/archive.js"
    ></script>
    <script type="module" src="https://loghue.com/js/app.js"></script>
  </body>
</html>
