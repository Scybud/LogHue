<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Settings | LogHue</title>

   <!--CSS LINKS-->
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/component.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/utilities.css" />

          <!--FAVICONS-->
  <link rel="apple-touch-icon" sizes="180x180" href="./../assets/icons/favicons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="./../assets/icons/favicons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./../assets/icons/favicons/favicon-16x16.png">

<style>
   .settingsWrapper {
  display: flex;
  flex-direction: column;
  gap: 2rem;
  padding: 1rem 0;
}

.settingsCard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 2rem;
  min-width: 100%;
}

.settingsCard.danger {
  border-color: var(--danger);
}
.settingsCard .danger{
  max-width: 300px;
}

.settingsCardTitle {
  font-size: 1.2rem;
  font-weight: 600;
  margin-bottom: 1.2rem;
}

.settingsGrid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1.2rem 1.5rem;
}

.settingsField.full {
  grid-column: 1 / -1;
}

.settingsLabel {
  display: block;
  font-size: 0.9rem;
  margin-bottom: 0.4rem;
  color: var(--text-muted);
}

.settingsAvatarRow {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.settingsAvatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  object-fit: cover;
}

.settingsTags {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-bottom: 0.5rem;
}

.settingsToggleRow {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.6rem 0;
  border-bottom: 1px solid var(--border);
}

.settingsToggleRow:last-child {
  border-bottom: none;
}

.settingsSaveBtn {
  display: block;
  margin: 1.2rem auto 1.2rem;
}
.settingsLongBtn {
  width: 100%;
  max-width: 300px;
}
.changePasswordBtn {
  color: #000000;
  display: block;
  max-width: 200px;
  text-decoration: none;
}
.colorPicker {
  width: 100%;
  max-width: 200px;
  height: 40px;
  margin: 8px auto;
  cursor: pointer;
}
</style>
</head>
<body>

   <!--PRELOADER-->
   <div class="preLoaderContainer">
        <div class="tt-wave-loader">
          <span></span><span></span><span></span>
        </div>
        <div class="label">Log<span>Hue</span></div>
      </div>
  
  <main class="main">
    <!-- SIDEBAR -->
    <div class="sidebarContainer grid" id="generalSidebarContainer">
      
    </div>
    
    <!-- MAIN CONTENT -->
    <article class="mainContent" id="dashboardContent">
      <header class="pageHeader">
        <div class="headerLeft">
            <button class="menuBtn" id="toggleSidebar">
              <span class="menuIcon">
                <!-- Menu Icon -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path
                    d="M4 6H20M4 12H20M4 18H20"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                  />
                </svg>
              </span>
              <span class="iconText">Menu</span>
            </button>
    
            <h2 class="pageTitle">
              Settings
            </h2>
          </div>
        </header>

        <div  id="modalContainer">
        
        </div>
        
        
<section class="settingsWrapper">

  <!-- ACCOUNT -->
  <div class="settingsCard">
    <h3 class="settingsCardTitle">Account</h3>

    <div class="settingsGrid">
      <div class="settingsField">
        <label class="settingsLabel" for="accName">Full Name</label>
        <input type="text" class="inputField" id="accName" placeholder="Your name" />
      </div>

      <div class="settingsField">
        <label class="settingsLabel" for="accEmail">Email</label>
        <input type="email" class="inputField" id="accEmail" placeholder="you@example.com" />
      </div>

      <div class="settingsField full">
        <label class="settingsLabel">Profile Photo</label>
        <div class="settingsAvatarRow">
          <img src="../assets/images/default_profile.png" class="settingsAvatar" />
          <button class="btn secondary">Upload</button>
        </div>
      </div>

      <div class="settingsField full">
        <label class="settingsLabel">Change Password</label>
        <a href="auth/passwordReset.html" class="btn changePasswordBtn">Update Password</a>
      </div>
    </div>

    <button class="btn primary settingsSaveBtn settingsLongBtn">Save Changes</button>
  </div>

  <!-- APPEARANCE -->
  <div class="settingsCard">
    <h3 class="settingsCardTitle">Appearance</h3>

    <div class="settingsGrid">
      <div class="settingsField">
        <label class="settingsLabel">Theme</label>
        <select class="inputField" id="themeSelect">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>

      <div class="settingsField">
        <label class="settingsLabel">Primary Color</label>
        <input type="color" class="colorPicker" id="primaryColor" value="#393838" />

        <button type="button" class="btn btn-sm btn-primary" id="reseToDefaultPrimary">Reset</button>
      </div>

      <div class="settingsField full">
        <label class="settingsLabel">Interface Density</label>
        <select class="inputField">
          <option value="comfortable">Comfortable</option>
          <option value="compact">Compact</option>
        </select>
      </div>
    </div>
  </div>

  <!-- NOTIFICATIONS -->
  <div class="settingsCard">
    <h3 class="settingsCardTitle">Notifications</h3>

    <div class="settingsToggleRow">
      <span>Email Notifications</span>
      <label for="emailNotification" class="switch"><input id="emailNotification" type="checkbox" checked /><span class="slider"></span></label>
    </div>

    <div class="settingsToggleRow">
      <span>In‑App Alerts</span>
      <label for="inAppNotification" class="switch"><input id="inAppNotification" type="checkbox" /><span class="slider"></span></label>
    </div>

    <div class="settingsToggleRow">
      <span>Marketing Emails</span>
      <label for="marketingEmails" class="switch"><input type="checkbox" id="marketingEmails" /><span class="slider"></span></label>
    </div>
  </div>

  <!-- PRIVACY -->
  <div class="settingsCard">
    <h3 class="settingsCardTitle">Privacy</h3>

    <div class="settingsField full">
      <label class="settingsLabel">Data Export</label>
      <button class="btn secondary">Download My Data</button>
    </div>

    <div class="settingsField full">
      <label class="settingsLabel">Tracking Preferences</label>
      <button class="btn secondary">Manage Tracking</button>
    </div>
  </div>

  <!-- SECURITY -->
  <div class="settingsCard">
    <h3 class="settingsCardTitle">Security</h3>

    <div class="settingsField full">
      <label class="settingsLabel">Two‑Factor Authentication</label>
      <button class="btn secondary settingsLongBtn">Enable 2FA</button>
    </div>

    <div class="settingsField full">
      <label class="settingsLabel">Active Sessions</label>
      <button class="btn secondary settingsLongBtn">View Devices</button>
    </div>
  </div>

  <!-- LANGUAGE & REGION -->
  <div class="settingsCard">
    <h3 class="settingsCardTitle">Language & Region</h3>

    <div class="settingsGrid">
      <div class="settingsField">
        <label class="settingsLabel">Language</label>
        <select class="inputField">
          <option value="en">English</option>
          <option value="de">Deutsch</option>
        </select>
      </div>

      <div class="settingsField">
        <label class="settingsLabel">Timezone</label>
        <select class="inputField">
          <option value="CET">Central European Time (CET)</option>
        </select>
      </div>
    </div>
  </div>

  <!-- DANGER ZONE -->
  <div class="settingsCard danger">
    <h3 class="settingsCardTitle">Danger Zone</h3>

    <button class="btn danger">Delete Account</button>
  </div>

</section>
         
      </article>
    </main>

    <!--
      <script type="module" src="../js/utils/noAuthSessionProtect.js"></script>
      -->

<script type="module" src="./../js/settings.js"></script>
        <script type="module" src="../js/app.js"></script>
</body>
</html>
