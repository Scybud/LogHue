<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      
  <title>ScanHue | Extract Text | LogHue</title>

      <!--CSS LINKS-->
    <link rel="stylesheet" href="https://loghue.com/css/base.css" />
    <link rel="stylesheet" href="https://loghue.com/css/theme.css" />
    <link rel="stylesheet" href="https://loghue.com/css/pages.css" />
    <link rel="stylesheet" href="https://loghue.com/css/component.css" />
    <link rel="stylesheet" href="https://loghue.com/css/layout.css" />
    <link rel="stylesheet" href="https://loghue.com/css/dashboard.css" />
    <link rel="stylesheet" href="https://loghue.com/css/utilities.css" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>Extract Text</h1>

    <input class="inputField" type="file" id="imageInput" accept="image/*">

    <canvas id="previewCanvas"></canvas>

    <button id="processBtn" class="btn btn-sm btn-primary">Extract Text</button>

    <textarea class="card" id="output" placeholder="Extracted text will appear here..."></textarea>
  </div>

  <script type="module" src="app.js"></script>

</body>
</html>
