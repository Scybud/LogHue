<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workspace Dashboard</title>

    <link rel="stylesheet" href="https://loghue.com/css/base.css" />
    <link rel="stylesheet" href="https://loghue.com/css/layout.css" />
    <link rel="stylesheet" href="https://loghue.com/css/component.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="https://loghue.com/css/theme.css" />
    <link rel="stylesheet" href="https://loghue.com/css/pages.css" />
    <link rel="stylesheet" href="https://loghue.com/css/utilities.css" />

    <!--FAVICONS-->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="https://loghue.com/assets/icons/favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://loghue.com/assets/icons/favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="https://loghue.com/assets/icons/favicons/favicon-16x16.png"
    />
  </head>

  <body>
    <!--PRELOADER-->
    <div class="preLoaderContainer">
      <div class="tt-wave-loader"><span></span><span></span><span></span></div>
      <div class="label">Log<span>Hue</span></div>
    </div>

    <div id="modalContainer"></div>
    <div id="actionsMessage"></div>

    <main class="main">
      <!-- SIDEBAR -->
      <div class="sidebarContainer" id="adminSidebarContainer"></div>

      <!-- MAIN CONTENT -->
      <article class="mainContent">
        <header class="pageHeader">
          <div class="headerLeft">
            <button class="menuBtn" id="toggleSidebar">
              <span class="menuIcon">
                <!-- Menu Icon -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path
                    d="M4 6H20M4 12H20M4 18H20"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                  />
                </svg>
              </span>
            </button>

            <h2 id="workspaceName"></h2>
          </div>
        </header>

        <section id="adminWorkspaceDashboardContent">
          <!-- Dynamic content will load here -->
        </section>
      </article>
    </main>
    <script type="module">
      import { initWorkspaceData } from "https://loghue.com/js/features/workspace-admin.js";

      initWorkspaceData();
    </script>

    <script
      type="module"
      src="https://loghue.com/js/utils/noAuthSessionProtect.js"
    ></script>
    <script type="module" src="https://loghue.com/js/app.js"></script>

    <!--QRCODE LIBRARY-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  </body>
</html>
