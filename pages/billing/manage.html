<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Manage Billing | LogHue</title>
   <link rel="stylesheet" href="https://loghue.com/css/base.css">
   <style>
      body {
         padding: 0 var(--space-md);
      }
  .manage-wrapper {
  max-width: 420px;
  margin: 3rem auto;
  padding: 2rem;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
}

.manage-title {
  font-size: 1.4rem;
  font-weight: 600;
  margin-bottom: 0.75rem;
}

.manage-desc {
  font-size: 0.95rem;
  color: #555;
  margin-bottom: 1.5rem;
  line-height: 1.5;
}

.manage-btn {
  width: 100%;
  padding: 0.85rem;
  background: #ff6b35;
  border: none;
  font-weight: 600;
  border-radius: 8px;
  font-size: 1rem;
  cursor: pointer;
  transition: background 0.2s;
}

.manage-btn:hover {
  background: #e85f2f;
}
  .backLink {
        display: flex;
        align-items: center;
        justify-content: center;
        position: sticky;
        top: 30px;
        left: 20px;
        padding: 0 auto;
        width: fit-content;
        background: none;
        color: var(--link);
      }

   </style>
</head>
<body>
   <a href="index" type="button" class=" backLink"> <!-- Back Icon -->
        <svg
  width="20"
  height="20"
  viewBox="0 0 20 20"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <path
    d="M11.75 4.25L6 10L11.75 15.75"
    stroke="currentColor"
    stroke-width="1.6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
 <span>Back to billing</span>
</a>

 <section class="manage-wrapper">
  <h1 class="manage-title">Manage Subscription</h1>

  <p class="manage-desc">
    Access your secure Stripe Billing Portal to update your payment method,
    change your plan, or cancel your subscription.
  </p>

  <button id="manage-btn" class="manage-btn">
    Open Billing Portal
  </button>
</section>


<script type="module" src="https://loghue.com/js/billing/manage.js"></script>
</body>
</html>
