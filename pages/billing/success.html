<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Success | LogHue</title>
   <link rel="stylesheet" href="https://loghue.com/css/base.css">
   <style>
      .billing-status {
  max-width: 420px;
  margin: 80px auto;
  padding: 40px;
  text-align: center;
  border-radius: 16px;
  background: var(--card-bg);
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  font-family: system-ui, sans-serif;
}

.billing-status h1 {
  margin-top: 12px;
  font-size: 1.8rem;
  font-weight: 600;
}

.billing-status p {
  margin: 12px 0 24px;
  color: var(--color);
  font-size: 1rem;
}

.icon {
  font-size: 48px;
  width: 72px;
  height: 72px;
  margin: 0 auto 16px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.success-icon {
  background: #d9ffe6;
  color: #1a9b5f;
}

.btn-primary {
  background: #ff6b35;
  border: none;
  font-weight: 600;
  padding: 12px 22px;
  border-radius: 8px;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.2s;
}

.btn-primary:hover {
  background: #e85f2f;
}

.btn-secondary {
  background: #f3f3f3;
  color: #333;
  border: none;
  padding: 12px 22px;
  border-radius: 8px;
  font-size: 1rem;
  cursor: pointer;
  margin-left: 10px;
  transition: 0.2s;
}

.btn-secondary:hover {
  background: #e4e4e4;
}

.actions {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 20px;
}

.loader {
  width: 28px;
  height: 28px;
  border: 3px solid var(--border);
  border-top-color: #ff6b35;
  border-radius: 50%;
  margin: 20px auto;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

   </style>
</head>
<body>
   <div class="billing-status success">
  <div class="icon success-icon">✔</div>
  <h1>Upgrade Successful</h1>
  <p>Your subscription is being activated. This usually takes a few seconds.</p>

  <div class="loader"></div>

  <button class="btn-primary" onclick="window.location.href='/billing'">
    Go to Billing
  </button>
</div>

<script type="module">
  import { supabase } from "https://loghue.com/js/supabase.js";

  async function waitForPlanUpdate() {
    for (let i = 0; i < 10; i++) {
      const { data: { session } } = await supabase.auth.getSession();
      const user = session?.user;

      if (!user) break;

      const { data: profile } = await supabase
        .from("profile")
        .select("plan_id")
        .eq("id", user.id)
        .single();

      if (profile?.plan_id) {
        window.location.href = "/dashboard";
        return;
      }

      await new Promise(r => setTimeout(r, 1500));
    }

    window.location.href = "/billing";
  }

  waitForPlanUpdate();
</script>

</body>
</html>
