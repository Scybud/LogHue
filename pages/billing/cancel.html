<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Cancel | LogHue</title>
<link rel="stylesheet" href="https://loghue.com/css/base.css">
   <style>
      .billing-status {
  max-width: 420px;
  margin: 80px auto;
  padding: 40px;
  text-align: center;
  border-radius: 16px;
  background: var(--card-bg);
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  font-family: system-ui, sans-serif;
}

.billing-status h1 {
  margin-top: 12px;
  font-size: 1.8rem;
  font-weight: 600;
}

.billing-status p {
  margin: 12px 0 24px;
  color: var(--color);
  font-size: 1rem;
}

.icon {
  font-size: 48px;
  width: 72px;
  height: 72px;
  margin: 0 auto 16px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cancel-icon {
  background: #fdeaea;
  color: #d64545;
}

.btn-primary {
  background: #ff6b35;
  border: none;
  padding: 12px 22px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.btn-primary:hover {
  background: #e85f2f;
}

.btn-secondary {
     font-weight: 600;
  background: none;
  color: #d9d9d9;
  border: 1px solid var(--border);
  padding: 12px 22px;
  border-radius: 8px;
  cursor: pointer;
  margin-left: 10px;
  transition: 0.2s;
}

.btn-secondary:hover {
  background: #696868;
}

.actions {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 20px;
}

   </style>
</head>
<body>
   <div class="billing-status cancel">
  <div class="icon cancel-icon">✖</div>
  <h1>Checkout Canceled</h1>
  <p>No changes were made to your subscription.</p>

  <div class="actions">
    <button class="btn-primary" onclick="window.location.href='/billing'">
      Back to Billing
    </button>
    <button class="btn-secondary" onclick="window.history.back()">
      Try Again
    </button>
  </div>
</div>

</body>
</html>
