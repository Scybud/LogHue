<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upgarding... | LogHue</title>

  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/component.css">

  <!--FAVICONS-->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="https://loghue.com/assets/icons/favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://loghue.com/assets/icons/favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="https://loghue.com/assets/icons/favicons/favicon-16x16.png"
    />

  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      color: #fff;
    }

    .loader {
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #ff6b35;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .msg {
      font-size: 18px;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div>
    <div class="loader"></div>
    <div class="msg">Redirecting you to secure checkout…</div>
  </div>

  <script type="module" src="../../js/billing/upgrade.js">
</script>
<script type="module" src="../../js/session.js"></script>
</body>
</html>
