<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes | LogHue</title>


  <!--CSS LINKS-->

  <!-- Quill CSS -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

  <link rel="stylesheet" href="https://loghue.com/css/base.css" />
  <link rel="stylesheet" href="https://loghue.com/css/layout.css" />
  <link rel="stylesheet" href="https://loghue.com/css/component.css" />
  <link rel="stylesheet" href="https://loghue.com/css/dashboard.css" />
  <link rel="stylesheet" href="https://loghue.com/css/theme.css" />
  <link rel="stylesheet" href="https://loghue.com/css/pages.css" />
  <link rel="stylesheet" href="https://loghue.com/css/utilities.css" />

  <!--FAVICONS-->
  <link rel="apple-touch-icon" sizes="180x180" href="https://loghue.com/assets/icons/favicons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="https://loghue.com/assets/icons/favicons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="https://loghue.com/assets/icons/favicons/favicon-16x16.png" />

  <style>
    .mainContent {
      padding-bottom: 100px;
    }

    /* MOBILE SIDEBAR */
    @media (min-width: 600px) and (max-width: 1900px) {
      .main {
        display: flex !important;
        width: 100%;
        justify-content: space-between;
      }

      .mainContent {
        width: 100%;
      }

      Button.menuBtn {
        display: none;
      }

      .mainContent {
        padding-bottom: 30px;
      }

      .sidebarContainer {
        width: 70px;
        height: 100%;
        transition: width 0.35s ease;
        border-right: 1px solid var(--border);
      }

      .sidebarContainer:hover {
        width: 400px;
      }

      .sidebarContainer:hover .navText,
      .sidebarContainer:hover div.navSectionLabel {
        opacity: 1;
      }

      .sidebarContainer .navText,
      .sidebarContainer div.navSectionLabel {
        opacity: 0;
        text-wrap: nowrap;
        transition: opacity 0.4s ease;
      }

      .sidebarContainer span.navIcon {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .sidebarContainer span.navIcon svg {
        width: 30px;
        height: 30px;
      }

      .sidebarContainer.slideShow {
        transform: translateX(0);
      }
    }
  </style>
</head>

<body>
  <!--PRELOADER -->
  <div class="preLoaderContainer">
    <div class="tt-wave-loader"><span></span><span></span><span></span></div>
    <div class="label">Log<span>Hue</span></div>
  </div>

  <header class="pageHeader">
    <div class="headerLeft">
      <button class="menuBtn" id="toggleSidebar">
        <span class="menuIcon">
          <!-- Menu Icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </span>
      </button>

      <h1 class="pageTitle">Notes</h1>
    </div>

    <div class="headerRight">
      <button id="createNote" class="btn btn-sm actionBtn" type="button">Create Note</button>

      <button id="notificationToggleBtn" title="Notifications" class="actionBtn">
        <span id="notifBadge" class="badge">0</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22c1.1 0 2-.9 2-2H10c0 1.1.9 2 2 2z" />
          <path d="M18 16v-5a6 6 0 10-12 0v5l-1.5 2h15L18 16z" />
        </svg>

      </button>

<div class="profileAvatarContainer">
          <img src="../assets/images/default_profile.png" alt="profile Image" class="profileAvatar">
        </div>
        
    </div>
  </header>

  <div id="modalContainer"></div>
  <div id="actionsMessage"></div>
  <!--INFO DISPLAY-->
  <div id="infoDisplay"></div>

  <!--NOTIFICATIONS-->
  <div id="notificationsContainer">
    <h2>Notifications</h2>
    <ul id="notificationsList">
      <p class="placeholderText">Nothing here yet.</p>

    </ul>
  </div>


  <main class="main">
    <!-- SIDEBAR -->
    <div class="sidebarContainer" id="sidebarContainer"></div>


    <!-- MAIN CONTENT -->
    <article class="mainContent" id="notesContent">

      <p class="danger"></p>
      <section class="notesContainer">

        <div id="notesListContainer">
          <h2>All Notes</h2>

          <div id="notesList">
            <p class="placeholderText">No notes created yet.</p>
            <!-- Dynamic content will load here -->
          </div>
        </div>
        <div id="editorContainer">
          <!-- Dynamic content will load here -->
        </div>
      </section>
    </article>
  </main>

  <script type="module" src="https://loghue.com/js/utils/noAuthSessionProtect.js"></script>

  <script type="module" src="https://loghue.com/js/app.js"></script>

  <!-- Quill JS -->
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <!--HTML TO PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!--HTML TO DOCX-->
  <script src="https://cdn.jsdelivr.net/npm/docx@7.8.2/build/index.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <script type="module" src="https://loghue.com/js/features/notes.js"></script>
</body>

</html>
