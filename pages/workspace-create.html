<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Workspace</title>

    <!--CSS LINK-->
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/pages.css" />
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/component.css" />

    <!--FAVICONS-->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./../assets/icons/favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./../assets/icons/favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./../assets/icons/favicons/favicon-16x16.png"
    />
    <link rel="manifest" href="./../assets/icons/favicons/site.webmanifest" />
  </head>
  <body>
    <!--PRELOADER-->
    <div class="preLoaderContainer">
      <div class="tt-wave-loader"><span></span><span></span><span></span></div>
      <div class="label">Log<span>Hue</span></div>
    </div>

    <h1 class="pageTitle">Create workspace</h1>
    <main class="main">
      <form class="form" id="WorkspaceCreationForm">
        <label for="workspacename">Workspace Name</label>
        <div class="singleInput">
          <input
            type="text"
            class="inputField"
            id="workspacename"
            placeholder="e.g. Marketing Team"
          />
          <button type="button" class="btn btn-primary" id="createWorkspace">
            Create Workspace
          </button>
        </div>
      </form>
    </main>
  </body>
</html>
