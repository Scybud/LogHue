<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Workspace</title>
<link rel="stylesheet" href="https://loghue.com/css/base.css">
<link rel="stylesheet" href="https://loghue.com/css/component.css">
<link rel="stylesheet" href="https://loghue.com/css/utilities.css">

  <style>
    body {
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      padding: 30px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }

    .loading {
      font-size: 18px;
      opacity: 0.7;
    }

    .error {
      color: #d33;
      font-weight: 600;
      margin-top: 10px;
    }

    .success {
      color: #2a8f2a;
      font-weight: 600;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Joining Workspace…</h2>
    <p id="status" class="loading">Please wait</p>
  </div>
  
  <script type="module">
  import { supabase } from "https://loghue.com/js/supabase.js";

  // --- THE DATA GRABBER ---
  // This looks at the browser address bar for "?token=..."
  const getUrlToken = () => {
    const params = new URLSearchParams(window.location.search);
    return params.get("token");
  };

  async function acceptInvite(token) {
    const status = document.getElementById("status");

    // Check if token exists before even trying Supabase
    if (!token) {
      status.textContent = "No invite token found in the URL.";
      status.className = "error";
      return;
    }

    // 1. Ensure user is logged in
    const { data: { user }, error: authError } = await supabase.auth.getUser();
    
    if (!user || authError) {
      // Save current URL so we can come back after login
      const redirectUrl = encodeURIComponent(window.location.href);
      window.location.href = `https://app.loghue.com/auth/index?redirect=${redirectUrl}`;
      return;
    }

    // 2. Fetch invite 
    const { data: invite, error: fetchError } = await supabase
      .from("workspace_invites")
      .select("*")
      .eq("token", token)
      .eq("accepted", false)
      .maybeSingle();

      if (fetchError) {
  console.error(fetchError);
  status.textContent = "Something went wrong while loading this invite.";
  status.className = "error";
  return;
}

if (!invite) {
  status.textContent = "This invite is no longer valid. Please request a new one.";
  status.className = "error";
  return;
}


    //CHECK NUMBER OF ACCEPTED INVITE 
    if(invite.accepted_count >= invite.max_invite_count) {
      status.textContent = "This invite link has reached its maximum number of uses (5). Please request a new one.";
      status.className = "error";
return;
    } 

    // 3. Add user to workspace
    const { error: memberError } = await supabase
      .from("workspace_members")
      .insert({
        workspace_id: invite.workspace_id,
        user_id: user.id,
        role: invite.role
      });

    if (memberError) {
      console.error("Member Error:", memberError);
      status.textContent = "You are already a member of this workspace or there was a permission error.";
      status.className = "error";
      return;
    }

    //RECALCULATE INVITE COUNT
    const currentCount = invite.accepted_count ?? 0;
const newCount = currentCount + 1;


    // 4. Mark invite used
    const isFullyUsed = newCount >= invite.max_invite_count;

const { data, error } = await supabase
  .from("workspace_invites")
  .update({
    accepted_count: newCount,
    accepted: isFullyUsed
  })
  .eq("id", invite.id);


if(error) {
  console.log("error")
}

    status.textContent = "Success! Redirecting...";
    status.className = "success";

 setTimeout(() => {
  if (invite.role === 'admin' || invite.role === 'owner') {
    window.location.href = `/workspace-dashboard-admin?ws=${invite.workspace_id}`;
  } else {
    window.location.href = `/workspace-dashboard-member?ws=${invite.workspace_id}`;
  }
}, 1500);

  }
  // --- EXECUTION ---
  const token = getUrlToken();
  acceptInvite(token);
    
  </script>
</body>
</html>
