<!DOCTYPE html>
<html>
<head>
  <title>Signing you in...</title>

<!--CSS LINK-->
    <link rel="stylesheet" href="https://loghue.com/css/base.css" />
    <link rel="stylesheet" href="https://loghue.com/css/pages.css" />
    <link rel="stylesheet" href="https://loghue.com/css/theme.css" />
        <link rel="stylesheet" href="https://loghue.com/css/utilities.css" />
    <link rel="stylesheet" href="https://loghue.com/css/component.css" />
    
    <style>
        html, body {
            width: 100%;
            height: 100%;
        }

body {
    display: flex;
    justify-content: center;
    align-items: center;
}
    .box {
      text-align: center;
    }

  .tunedText {
        text-align: center;
      }
      h1 {
        margin: 20px 0;
      }

      .loader {
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid var(--primary-light);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="box">
    <p class="tunedText">Signing you in...</p>
    <div class="loader"></div>
  </div>

  <script type="module" src="https://loghue.com/js/auth/callback.js"></script>
</body>
</html>
