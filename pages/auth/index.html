<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth | LogHue</title>

    <!--CSS LINKS-->
    <link rel="stylesheet" href="https://loghue.com/css/base.css" />
    <link rel="stylesheet" href="https://loghue.com/css/component.css" />
    <link rel="stylesheet" href="https://loghue.com/css/utilities.css" />

    <!--FAVICONS-->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="https://loghue.com/assets/icons/favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://loghue.com/assets/icons/favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="https://loghue.com/assets/icons/favicons/favicon-16x16.png"
    />

    <style>
      main {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .authGateway {
        max-width: 460px;
        width: 100%;
        margin: 0 auto;
        padding: 2rem;
        text-align: center;
      }

      .authGateway .logo {
        width: 80px;
        margin-bottom: 1rem;
      }

      .authGateway h1 {
        font-size: 1.6rem;
        margin-bottom: 2rem;
      }

      .oauthBtn {
        color: var(--color);
        width: 100%;
        padding: 0.75rem;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--surface);
        margin-bottom: 0.75rem;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        transition:
          background 0.2s,
          border-color 0.2s;
      }

      .oauthBtn:hover {
        background: var(--surface-2);
        border-color: var(--border-hover);
      }

      .oauthBtn .icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .oauthBtn svg {
        width: 18px;
        height: 18px;
      }

      .primaryBtn {
        background: var(--active);
        margin-bottom: 0.75rem;
      }
      .secondaryBtn {
        background: var(--surface-2);
      }
      .primaryBtn,
      .secondaryBtn {
        width: 100%;
        display: block;
        padding: 0.75rem;
        color: var(--color);
        border-radius: var(--radius);
        cursor: pointer;
        transition: all 0.5 ease;
      }
      .primaryBtn:hover,
      .secondaryBtn:hover {
        text-decoration: none;
        opacity: 0.7;
      }
      button{
           width: 100%;
        display: block;
        margin-top: 12px;
      }
      .divider {
        display: flex;
        align-items: center;
        margin: 1.5rem 0;
      }

      .divider span {
        padding: 0 0.5rem;
        color: var(--text-secondary);
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border-light);
      }
      .oauthBtn {
        width: 100%;
        padding: 0.75rem;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--surface);
        margin-bottom: 0.75rem;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        transition:
          background 0.2s,
          border-color 0.2s;
      }

      .oauthBtn:hover {
        background: var(--surface-2);
        border-color: var(--border-hover);
      }

      .oauthBtn .icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .oauthBtn svg {
        width: 18px;
        height: 18px;
      }

      .form {
        margin-top: 50px;
        display: none;
      }
      .show {
        gap: 10px;
        display: flex;
      }
      .backBtn.show {
        display: block;
      }
      .backBtn {
        display: flex;
        align-items: center;
        justify-content: center;
        position: sticky;
        top: 30px;
        left: 20px;
        padding: 0 auto;
        display: none;
        width: fit-content;
        background: none;
        color: var(--link);
      }
      .backLink {
                position: sticky;
        top: 30px;
        left: 20px;
        padding: 0 auto;
        width: fit-content;
        background: none;
        color: var(--link);
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <button type="button" class="btn backBtn btn-sm"> <!-- Back Icon -->
        <svg
  width="20"
  height="20"
  viewBox="0 0 20 20"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <path
    d="M11.75 4.25L6 10L11.75 15.75"
    stroke="currentColor"
    stroke-width="1.6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
 <span>Back</span>
</button>

    <a href="https://loghue.com/index.html" class="backLink"> <!-- Back Icon -->
        <svg
  width="20"
  height="20"
  viewBox="0 0 20 20"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <path
    d="M11.75 4.25L6 10L11.75 15.75"
    stroke="currentColor"
    stroke-width="1.6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
<span>Home</span></a>
    <main class="main">
      <!-- AUTH GATEWAY -->
      <div class="authGateway">
        <img
          src="https://loghue.com/assets/images/loghue-logo.png"
          class="logo"
          alt="LogHue Logo"
        />

        <h1>Welcome to LogHue</h1>
        <!-- GOOGLE -->
        <button class="oauthBtn google" id="googleAuth">
          <span class="icon">
            <svg width="18" height="18" viewBox="0 0 48 48">
              <path
                fill="#EA4335"
                d="M24 9.5c3.54 0 6.71 1.23 9.21 3.64l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.02 17.74 9.5 24 9.5z"
              />
              <path
                fill="#4285F4"
                d="M46.5 24.5c0-1.57-.14-3.08-.41-4.5H24v9h12.85c-.56 2.85-2.2 5.26-4.7 6.88l7.27 5.64C43.79 37.52 46.5 31.47 46.5 24.5z"
              />
              <path
                fill="#FBBC05"
                d="M10.54 28.41c-.48-1.43-.75-2.95-.75-4.5s.27-3.07.75-4.5l-7.98-6.19C.92 16.07 0 19.94 0 24c0 4.06.92 7.93 2.56 11.28l7.98-6.19z"
              />
              <path
                fill="#34A853"
                d="M24 48c6.47 0 11.9-2.38 15.92-6.5l-7.27-5.64c-2.01 1.35-4.58 2.14-8.65 2.14-6.26 0-11.57-3.52-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
              />
            </svg>
          </span>
          Continue with Google
        </button>

        <!-- MICROSOFT -->
        <button class="oauthBtn microsoft" id="microsoftAuth">
          <span class="icon">
            <svg width="18" height="18" viewBox="0 0 23 23">
              <rect width="10" height="10" fill="#F35325" />
              <rect x="12" width="10" height="10" fill="#81BC06" />
              <rect y="12" width="10" height="10" fill="#05A6F0" />
              <rect x="12" y="12" width="10" height="10" fill="#FFBA08" />
            </svg>
          </span>
          Continue with Microsoft
        </button>

        <!-- GITHUB -->
        <button class="oauthBtn github" id="githubAuth">
          <span class="icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 0.5C5.65 0.5 0.5 5.65 0.5 12c0 5.1 3.29 9.42 7.86 10.96.58.1.79-.25.79-.56v-2.1c-3.2.7-3.87-1.54-3.87-1.54-.53-1.34-1.3-1.7-1.3-1.7-1.06-.72.08-.71.08-.71 1.17.08 1.78 1.2 1.78 1.2 1.04 1.78 2.73 1.27 3.4.97.1-.76.41-1.27.75-1.56-2.55-.29-5.23-1.28-5.23-5.7 0-1.26.45-2.3 1.2-3.11-.12-.3-.52-1.52.11-3.17 0 0 .97-.31 3.18 1.19a11.1 11.1 0 0 1 5.8 0c2.2-1.5 3.17-1.19 3.17-1.19.63 1.65.23 2.87.11 3.17.75.81 1.2 1.85 1.2 3.11 0 4.43-2.69 5.41-5.25 5.69.42.36.8 1.08.8 2.18v3.23c0 .31.21.67.8.56A10.99 10.99 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5z"
              />
            </svg>
          </span>
          Continue with GitHub
        </button>

        <div class="divider"><span>or</span></div>

        <a href="#login" class="primaryBtn emailLogin" id="emailLogin"
          >Log in with Email</a
        >
        <a
          href="#signup"
          class="secondaryBtn oauthBtn emailSignup"
          id="emailSignup"
          >Create an Account</a
        >
      </div>

      <!--LOGIN FORM-->
      <form class="form" id="loginForm">
        <h2>Login</h2>
        <label for="userLoginEmailInput">Email</label>
        <input
          type="email"
          name="userLoginEmailInput"
          id="userLoginEmailInput"
          class="inputField"
          placeholder="e.g. example@gmail.com"
          required
        />
        <label for="userLoginPasswordInput">Password</label>
        <input
          type="password"
          name="userLoginPasswordInput"
          id="userLoginPasswordInput"
          class="inputField"
          placeholder="Your account password"
          required
        />
        <button class="btn " id="loginBtn" type="submit">Login</button>
        <a href="auth/passwordReset.html">Forgot password?</a>
      </form>

      <!--SIGNUP FORM-->
      <form class="form" id="signupForm">
        <h2>Signup</h2>
        <label for="userSignupNameInput">Full Name</label>
        <input
          type="text"
          name="userSignupNameInput"
          id="userSignupNameInput"
          class="inputField"
          placeholder="e.g. Abdulroqib Oladipo"
          required
        />
        <label for="userSignupEmailInput">Email</label>
        <input
          type="email"
          name="userSignupEmailInput"
          id="userSignupEmailInput"
          class="inputField"
          placeholder="e.g. example@gmail.com"
          required
        />
        <label for="userSignupPasswordInput">Password</label>
        <input
          type="password"
          name="userSignupPasswordInput"
          id="userSignupPasswordInput"
          class="inputField"
          placeholder="Create a password for your account"
          required
        />
        <label for="userSignupConfirmPasswordInput">Confirm Password</label>
        <input
          type="password"
          name="userSignupConfirmPasswordInput"
          id="userSignupConfirmPasswordInput"
          class="inputField"
          placeholder="Confirm your password"
          required
        />
        <button class="btn" id="signupBtn" type="submit">Signup</button>
      </form>
    </main>

    <script>
      const backBtn = document.querySelector(".backBtn");
      const backLink = document.querySelector(".backLink");

      backBtn.addEventListener("click", () => {
        window.location.reload();
      });
      const authGatewayContainer = document.querySelector(".authGateway");
      const loginForm = document.getElementById("loginForm");
      const SignupForm = document.getElementById("signupForm");

      const emailLoginBtn = document.querySelectorAll(".emailLogin");
      const emailSignupBtn = document.querySelectorAll(".emailSignup");

      function hideConatiner(
        hideCont1,
        hideCont2,
        showCont,
        showBtn,
        hideLink,
      ) {
        hideCont1.classList.add("hide");
        hideCont2.classList.add("hide");
        hideLink.classList.add("hide");
        showCont.classList.add("show");
        showBtn.classList.add("show");
      }

      emailLoginBtn.forEach((btn) => {
        btn.addEventListener("click", () => {
          hideConatiner(
            authGatewayContainer,
            SignupForm,
            loginForm,
            backBtn,
            backLink,
          );
        });
      });

      emailSignupBtn.forEach((btn) => {
        btn.addEventListener("click", () => {
          hideConatiner(
            authGatewayContainer,
            loginForm,
            SignupForm,
            backBtn,
            backLink,
          );
        });
      });
    </script>
    <script type="module" src="https://loghue.com/js/auth/auth.js"></script>
  </body>
</html>
