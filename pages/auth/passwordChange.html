<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | LogHue</title>

    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/component.css" />
    <link rel="stylesheet" href="../../css/utilities.css" />
   
         <!--FAVICONS-->
  <link rel="apple-touch-icon" sizes="180x180" href="./../../assets/icons/favicons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="./../../assets/icons/favicons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./../../assets/icons/favicons/favicon-16x16.png">
  </head>

  <body>

     <!--PRELOADER-->
   <div class="preLoaderContainer">
        <div class="tt-wave-loader">
          <span></span><span></span><span></span>
        </div>
        <div class="label">Log<span>Hue</span></div>
      </div>
      
      <!--RESET PASSWORD EMAIL FORM-->
      <div class="step-indicator" data-step="2" data-total="2">
         <div class="step-indicator-bar-container">
            <div class="step-bar step-2"></div>
         </div>
      </div>
      
      <main class="main">
         
         <form class="form" id="passwordChangeForm">
         <h2>Reset Password</h2>
         <label for="passwordResetNewPassword">New Password</label>
         <div class="singleInput">
            <input type="password" name="passwordResetNewPassword" id="passwordResetNewPassword" class="inputField" placeholder="Your new password" required>
            <button class="btn btn-primary" id="passwordResetNewPasswordSubmitBtn" type="submit">Submit</button>
         </div>
      </form>
    </main>

    <script type="module" src="../../js/utils/noAuthSessionProtect.js"></script>
    <script type="module" src="../../js/auth/passwordReset.js"></script>
    <script type="module" src="../../js/app.js"></script>
  </body>
</html>
