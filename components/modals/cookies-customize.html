<div id="consent-modal" class="consent-modal">
  <div class="modal-content">
    <h3>Cookie Preferences</h3>

    <label class="toggle">
      <span>Essential Cookies</span>
      <input type="checkbox" checked disabled>
    </label>

    <label class="toggle">
      <span>Analytics</span>
      <input id="toggle-analytics" type="checkbox">
    </label>

    <label class="toggle">
      <span>Marketing</span>
      <input id="toggle-marketing" type="checkbox">
    </label>

    <div class="modal-actions">
      <button id="save-preferences" class="btn primary">Save Preferences</button>
      <button id="close-modal" class="btn secondary">Cancel</button>
    </div>
  </div>
</div>
