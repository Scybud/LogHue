<div class="modalContainer">

   <div class="invite-modal">
  <h2>Add Member</h2>

  <div class="invite-methods">
    <button class="btn" id="invite-email-btn">Invite by Email</button>
    <button class="btn" id="invite-qr-btn">Invite via QR</button>
  </div>

  <!-- Email Section -->
  <div id="invite-email-section">
    <label>Email</label>
    <input class="inputField" id="invite-email-input" type="email" placeholder="user@example.com" />

    <label>Role</label>
    <select id="invite-role-email">
      <option value="member">Member</option>
      <option value="admin">Admin</option>
    </select>

    <button class="btn" id="send-email-invite-btn">Send Invite</button>
  </div>

  <!-- QR Section -->
  <div id="invite-qr-section" style="display:none;">
    <label>Role</label>
    <select id="invite-role-qr">
      <option value="member">Member</option>
      <option value="admin">Admin</option>
    </select>

    <div id="qr-container" style="margin-top:20px;"></div>

    <input class="inputField" id="invite-link-input" readonly />
    <button class="btn" id="copy-invite-link-btn">Copy Link</button>
  </div>
</div>


</div>
