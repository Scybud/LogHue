<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      background: #111;
      color: white;
      font-family: sans-serif;
    }

    /* Outer container (viewport) */
    .scroller {
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      box-sizing: border-box;
      border: 2px solid #444;
    }

    /* Inner content wrapper */
    .scroller-content {
      display: inline-block;
      padding-left: 100%;
      /* Push first copy fully into view */
      animation: scroll 10s linear infinite;
    }

    /* Each content block */
    .scroller-content span {
      display: inline-block;
      padding: 0 2rem;
    }

    /* Keyframes for continuous movement */
    @keyframes scroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }
  </style>
</head>

<body>

  <div class="scroller">
    <div class="scroller-content">
      <!-- Duplicate content for seamless loop -->
      <span>🚀 This is a seamless infinite scroll</span>
      <span>🚀 This is a seamless infinite scroll</span>
    </div>
  </div>

</body>

</html>
