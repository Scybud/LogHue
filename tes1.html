<!DOCTYPE html>
<html>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/dashboard.css">

<head>
  <style>
:root {
  --primary: #1565C0; 
  --primary-light: #1976D2;
  
  --secondary: #334155;
  --secondary-light: #475569;  /* lighter slate */

--accent: #f59e0b;
--accent-hover: #d97706;
}
html, body {
  width: 100%;
  height: 100%;
}
body {
  display: flex;
  justify-content: center;
  align-items: center;
}
  .p {
    color: #fff;
    background: var(--primary);
  }
  .p:hover {
    background: var(--primary-light);
  }
  .s {
    color: #fff;
    background: var(--secondary);
  }
  .s:hover {
    background: var(--secondary-light);
  }
  .a {
        color: #111;

    background: var(--accent);
  }
.a:hover {
  background: var(--accent-hover);
}
  button {
    padding: 8px;
    font-weight: 600;
    border-radius: var(--radius);
  }

  
  </style>
</head>

<body>

<a href="scanhue" class="navBtn" data-section="scanhue">
  <span class="navIcon">
    <!-- ScanHue Icon -->
    <svg width="18" height="18" viewBox="0 0 64 64" fill="none">
      <!-- Outer frame (blue) -->
      <rect x="8" y="8" width="48" height="48" rx="10"
        stroke="#3B82F6" stroke-width="2" />

      <!-- Corner brackets -->
      <path d="M18 24 V18 H24"
        stroke="#3B82F6" stroke-width="2" stroke-linecap="round" />
      <path d="M46 24 V18 H40"
        stroke="#3B82F6" stroke-width="2" stroke-linecap="round" />
      <path d="M18 40 V46 H24"
        stroke="#3B82F6" stroke-width="2" stroke-linecap="round" />
      <path d="M46 40 V46 H40"
        stroke="#3B82F6" stroke-width="2" stroke-linecap="round" />

      <!-- Document -->
      <path d="M26 22 H36 L42 28 V42 H26 Z"
        stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round" />
      <path d="M36 22 V28 H42"
        stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round" />

      <!-- Text lines -->
      <line x1="28" y1="32" x2="40" y2="32"
        stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />
      <line x1="28" y1="36" x2="38" y2="36"
        stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />
      <line x1="28" y1="40" x2="36" y2="40"
        stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />

      <!-- Scan beam -->
      <rect x="24" y="30" width="24" height="4" rx="2"
        fill="#3B82F6" opacity="0.35" />

      <!-- Yellow accent -->
      <circle cx="38" cy="26" r="2" fill="#FACC15" />
    </svg>
  </span>

  <span class="navText">ScanHue</span>

  <!-- External link arrow (right side) -->
  <span class="navExternal">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
      <path d="M7 17 L17 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M10 7 H17 V14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </span>
</a>


</body>

</html>
