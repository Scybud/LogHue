<!DOCTYPE html>
<html>
<link rel="stylesheet" href="css/base.css">
<head>
  <style>
:root {
  --primary: #1565C0; 
  --primary-light: #1976D2;
  
  --secondary: #334155;
  --secondary-light: #475569;  /* lighter slate */

--accent: #f59e0b;
--accent-hover: #d97706;
}
  .p {
    color: #fff;
    background: var(--primary);
  }
  .p:hover {
    background: var(--primary-light);
  }
  .s {
    color: #fff;
    background: var(--secondary);
  }
  .s:hover {
    background: var(--secondary-light);
  }
  .a {
        color: #111;

    background: var(--accent);
  }
.a:hover {
  background: var(--accent-hover);
}
  button {
    padding: 8px;
    font-weight: 600;
    border-radius: var(--radius);
  }
  </style>
</head>

<body>

<button class="p">Primary</button>
<button class="s">Secondary</button>
<button class="a">Accent</button>
</body>

</html>
